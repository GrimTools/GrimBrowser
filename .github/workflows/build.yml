name: Build installers

# Runs when you push a version tag (e.g. v1.0.0) — or manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest   # → .exe
          - os: macos-latest     # → .dmg
          - os: ubuntu-latest    # → .AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist

      # Keep the built installers even for manual runs (no tag needed)
      - name: Save installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grim-${{ matrix.os }}
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap

      - name: Upload to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # the .yml/.blockmap files are what the auto-updater reads
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
